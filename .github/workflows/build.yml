name: Build & Push

# Rebuild and push the container image to GHCR on every push to main
# that touches image-affecting files.  Doc-only pushes are skipped to
# avoid burning the 2 000 free GitHub Actions minutes/month on a 30-min
# build that downloads the CUDA base image + open-webui.
on:
  push:
    branches: [main]
    paths:
      - Containerfile
      - scripts/**
      - supervisord/**
      - mise.toml
      - .github/workflows/build.yml

# Cancel any in-progress build for the same branch when a new push arrives.
# Prevents stale builds from overwriting :latest after a newer push completes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/affragak/ai-boost
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Store build cache as a separate tag in GHCR instead of GHA cache
          # storage. This avoids the 10 GB GHA cache limit (a CUDA + pip image
          # fills it quickly) while keeping layer reuse across builds.
          cache-from: type=registry,ref=ghcr.io/affragak/ai-boost:buildcache
          cache-to: type=registry,ref=ghcr.io/affragak/ai-boost:buildcache,mode=min,compression=zstd,image-manifest=true,oci-mediatypes=true
