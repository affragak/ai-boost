name: ai

services:
  ai:
    container_name: ai-boost
    build:
      context: .
      dockerfile: Containerfile

    image: ai

    # Load secrets from .env (copy .env.example → .env and fill in values)
    env_file:
      - path: .env
        required: false   # allow running with exported vars only, no .env needed

    # GPU passthrough via CDI (requires nvidia-container-toolkit on host)
    devices:
      - nvidia.com/gpu=all

    security_opt:
      - label=disable

    ports:
      - "8080:8080"
      - "11434:11434"

    environment:
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISE_GITHUB_TOKEN: ${MISE_GITHUB_TOKEN}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      CLOUDFLARED_TUNNEL_ID: ${CLOUDFLARED_TUNNEL_ID}

    volumes:
      - type: bind
        source: ${HOME}/.ollama
        target: /home/ubuntu/.ollama
        # :z sets SELinux label for Podman (equiv to devcontainer consistency=cached)
        bind:
          selinux: z
      - type: bind
        source: ${HOME}/.cloudflared
        target: /home/ubuntu/.cloudflared
        bind:
          selinux: z
      - type: bind
        source: ${HOME}/.local/share/open-webui
        target: /home/ubuntu/.local/share/open-webui
        bind:
          selinux: z

    stdin_open: true
    tty: true
